<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" fill="none">
  <defs>
    <!-- Richer shadows -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#4A2A1E" flood-opacity="0.22"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <!-- Paper Textures/Gradients -->
    <linearGradient id="agedPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDF5E8"/>
      <stop offset="100%" stop-color="#E8D0B0"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4C430" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="quillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A67B5B"/>
      <stop offset="100%" stop-color="#683B2B"/>
    </linearGradient>
  </defs>

  <!-- --- COLLAGE BACKGROUND --- -->
  <g filter="url(#premiumShadow)">
    <!-- Bottom layer: Old Maps/Letters -->
    <rect x="180" y="80" width="420" height="500" rx="4" fill="#E8D1B5" transform="rotate(12 390 330)"/>
    <path d="M220 120 L550 120 L550 500 L220 500 Z" fill="none" stroke="#683B2B" stroke-width="0.5" opacity="0.2" transform="rotate(12 390 330)"/>
    
    <!-- Middle layer: Cream Deckle Paper -->
    <rect x="200" y="60" width="380" height="480" rx="2" fill="url(#agedPaper)" transform="rotate(-5 390 300)"/>
    <!-- Torn edge detail -->
    <path d="M200 60 Q205 65 210 60 Q215 55 220 60" fill="none" stroke="#D4B896" stroke-width="1.5" opacity="0.4" transform="rotate(-5 390 300)"/>

    <!-- Top layer: Pure Ivory Sheet -->
    <rect x="250" y="40" width="340" height="450" rx="1" fill="#FAF6F2" transform="rotate(2 420 265)"/>
    
    <!-- Hand-written Script -->
    <g transform="rotate(2 420 265) translate(300, 150)">
      <text font-family="'Georgia', serif" font-size="34" fill="#683B2B" font-style="italic" opacity="0.75" letter-spacing="-1">Stories are</text>
      <text x="25" y="55" font-family="'Georgia', serif" font-size="34" fill="#683B2B" font-style="italic" opacity="0.75" letter-spacing="-1">the keys to</text>
      <text x="50" y="110" font-family="'Georgia', serif" font-size="34" fill="#683B2B" font-style="italic" opacity="0.75" letter-spacing="-1">our hearts.</text>
      
      <!-- Hand-drawn hearts -->
      <path d="M160 170 Q160 155 175 155 Q190 155 190 170 Q190 190 160 210 Q130 190 130 170 Q130 155 145 155 Q160 155 160 170Z" 
            fill="none" stroke="#D49E8D" stroke-width="2.5" opacity="0.5"/>
    </g>
  </g>

  <!-- --- BOTANICAL ACCENTS --- -->
  
  <!-- Baby's Breath (Left) -->
  <g stroke="#5A7040" stroke-width="1.2" opacity="0.6">
    <path d="M150 550 Q170 450 140 350" fill="none"/>
    <path d="M145 420 Q120 400 130 380" fill="none"/>
  </g>
  <g fill="white" stroke="#E8D0B0" stroke-width="0.3">
    <circle cx="140" cy="350" r="3.5"/>
    <circle cx="130" cy="380" r="3"/>
    <circle cx="145" cy="345" r="2.5"/>
  </g>

  <!-- Large Eucalyptus Branch (Right) -->
  <g transform="translate(620, 200) rotate(15)">
    <path d="M0 400 L-20 0" stroke="#6B8A48" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <ellipse cx="-15" cy="50" rx="15" ry="18" fill="#7A9952" opacity="0.7"/>
    <ellipse cx="5" cy="120" rx="18" ry="22" fill="#6B8A48" opacity="0.6"/>
    <ellipse cx="-20" cy="200" rx="20" ry="25" fill="#7A9952" opacity="0.5"/>
  </g>

  <!-- --- THE QUILL & INK --- -->
  
  <g filter="url(#premiumShadow)">
    <!-- Heavy Glass Inkwell -->
    <path d="M640 460 Q640 500 680 505 Q720 505 740 495 L740 410 Q710 400 680 405 Q640 410 640 460 Z" fill="#0F0A06"/>
    <ellipse cx="690" cy="410" rx="45" ry="18" fill="#1A120B"/>
    <!-- Brass neck -->
    <ellipse cx="690" cy="405" rx="28" ry="12" fill="#B08D57" stroke="#8B6A40" stroke-width="1"/>
    <!-- Deep ink surface -->
    <ellipse cx="690" cy="403" rx="22" ry="8" fill="#000" opacity="0.9"/>
    
    <!-- Quill Feather (High Detail) -->
    <g transform="rotate(-18 690 400)">
      <path d="M690 400 Q705 250 780 80" stroke="#3D2510" stroke-width="4" stroke-linecap="round"/>
      <!-- Feather main body -->
      <path d="M780 80 Q730 110 710 230 Q720 320 690 400 Q680 340 660 230 Q670 110 780 80" fill="url(#quillGrad)" opacity="0.95"/>
      <!-- Delicate vein details -->
      <path d="M770 100 L735 125" stroke="white" stroke-width="0.5" opacity="0.15"/>
      <path d="M755 140 L720 165" stroke="white" stroke-width="0.5" opacity="0.15"/>
      <path d="M740 180 L705 205" stroke="white" stroke-width="0.5" opacity="0.15"/>
    </g>
  </g>

  <!-- --- VINTAGE ASSETS --- -->

  <!-- Ornate Golden Key -->
  <g transform="translate(450, 480) rotate(-35)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#D4B896" stroke-width="4.5"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#A67B5B" stroke-width="1.5"/>
    <!-- Cross details inside handle -->
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#A67B5B" stroke-width="1"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#A67B5B" stroke-width="1"/>
    <!-- Shaft -->
    <rect x="-2.5" y="18" width="5" height="70" fill="#D4B896"/>
    <!-- Bits -->
    <rect x="2.5" y="65" width="15" height="5" rx="1" fill="#D4B896"/>
    <rect x="2.5" y="75" width="15" height="5" rx="1" fill="#D4B896"/>
    <!-- Glow -->
    <circle cx="0" cy="0" r="30" fill="url(#goldGlow)"/>
  </g>

  <!-- Sealing Wax (Terracotta) -->
  <g transform="translate(580, 520)">
    <path d="M-25 0 Q-25 -25 0 -25 Q25 -25 25 0 Q25 25 0 25 Q-25 25 -25 0Z" fill="#8B3E2F" opacity="0.9"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#A67B5B" stroke-width="1" opacity="0.4"/>
    <!-- Embossed Key Logo -->
    <path d="M-5 -5 L5 -5 L5 5 L0 8 L-5 5 Z" fill="#A67B5B" opacity="0.6"/>
  </g>

  <!-- --- WHIMSICAL PARTICLES --- -->
  <g filter="url(#softGlow)">
    <circle cx="250" cy="120" r="2" fill="#D49E8D" opacity="0.6"/>
    <circle cx="650" cy="80" r="3" fill="#D49E8D" opacity="0.4"/>
    <circle cx="100" cy="450" r="2.5" fill="#D49E8D" opacity="0.5"/>
    <circle cx="750" cy="580" r="2" fill="#D49E8D" opacity="0.6"/>
  </g>

</svg>
