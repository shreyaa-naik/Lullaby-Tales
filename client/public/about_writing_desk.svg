<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" fill="none">
  <!-- Soft Shadow for all elements -->
  <defs>
    <filter id="deskShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#683B2B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="cupGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF6F2"/>
      <stop offset="100%" stop-color="#E8D0B0"/>
    </linearGradient>
  </defs>

  <g filter="url(#deskShadow)">
    <!-- Stack of Papers/Notebook -->
    <rect x="80" y="150" width="300" height="220" rx="4" fill="#FDF5E8" transform="rotate(-3 230 260)"/>
    <rect x="90" y="140" width="300" height="220" rx="4" fill="#FAF6F2" stroke="#E8D0B0" stroke-width="1" transform="rotate(2 240 250)"/>
    
    <!-- Lines on paper -->
    <g stroke="#D4C4B0" stroke-width="1" opacity="0.6">
      <line x1="120" y1="180" x2="350" y2="185" transform="rotate(2 240 250)"/>
      <line x1="120" y1="200" x2="350" y2="205" transform="rotate(2 240 250)"/>
      <line x1="120" y1="220" x2="350" y2="225" transform="rotate(2 240 250)"/>
      <line x1="120" y1="240" x2="350" y2="245" transform="rotate(2 240 250)"/>
      <line x1="120" y1="260" x2="350" y2="265" transform="rotate(2 240 250)"/>
      <line x1="120" y1="280" x2="330" y2="285" transform="rotate(2 240 250)"/>
    </g>

    <!-- Coffee Cup -->
    <g transform="translate(320, 280)">
      <!-- Saucer -->
      <ellipse cx="60" cy="80" rx="70" ry="25" fill="#E8D0B0" opacity="0.5"/>
      <ellipse cx="60" cy="76" rx="65" ry="22" fill="#FAF6F2" stroke="#D49E8D" stroke-width="1.5"/>
      
      <!-- Cup Handle -->
      <path d="M105 45 Q125 45 125 65 Q125 85 105 85" stroke="#FAF6F2" stroke-width="8" fill="none"/>
      <path d="M105 45 Q120 45 120 65 Q120 85 105 85" stroke="#E8D0B0" stroke-width="2" fill="none"/>

      <!-- Cup Body -->
      <path d="M15 40 Q15 95 60 95 Q105 95 105 40 Z" fill="url(#cupGrad)" stroke="#D49E8D" stroke-width="1"/>
      
      <!-- Coffee Surface -->
      <ellipse cx="60" cy="40" rx="42" ry="12" fill="#683B2B"/>
      <ellipse cx="50" cy="38" rx="15" ry="4" fill="#8B4F38" opacity="0.6"/>
      
      <!-- Steam -->
      <g opacity="0.4" stroke="#FAF6F2" stroke-width="2" stroke-linecap="round">
        <path d="M45 15 Q40 5 45 -5">
          <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2s" repeatCount="indefinite" />
        </path>
        <path d="M60 10 Q55 0 60 -10"/>
        <path d="M75 18 Q70 8 75 -2"/>
      </g>
    </g>

    <!-- Fountain Pen -->
    <g transform="rotate(45 150 120) translate(150, 100)">
      <rect x="0" y="0" width="10" height="120" rx="5" fill="#3D2510"/>
      <rect x="0" y="40" width="10" height="5" fill="#D4B896"/> <!-- Gold Band -->
      <path d="M0 120 L5 140 L10 120 Z" fill="#D4B896"/> <!-- Nib -->
      <line x1="5" y1="125" x2="5" y2="135" stroke="#3D2510" stroke-width="0.5"/>
    </g>

    <!-- Scattered Petals -->
    <path d="M100 100 Q110 85 120 100 Q110 115 100 100Z" fill="#D49E8D" opacity="0.6" transform="rotate(20 100 100)"/>
    <path d="M380 380 Q390 365 400 380 Q390 395 380 380Z" fill="#D49E8D" opacity="0.4" transform="rotate(-15 380 380)"/>
    <path d="M50 320 Q60 305 70 320 Q60 335 50 320Z" fill="#D49E8D" opacity="0.5" transform="rotate(45 50 320)"/>

    <!-- Small Succulent/Plant Pot (Top Right) -->
    <g transform="translate(400, 100)">
      <path d="M0 40 Q0 60 25 60 Q50 60 50 40 L45 0 L5 0 Z" fill="#D4B896"/>
      <g fill="#6B8A48">
        <path d="M25 0 Q10 -20 5 -40 Q25 -25 25 0Z" opacity="0.9"/>
        <path d="M25 0 Q40 -20 45 -40 Q25 -25 25 0Z" opacity="0.8"/>
        <path d="M25 0 Q25 -30 25 -50 Q35 -30 25 0Z" opacity="1"/>
      </g>
    </g>
  </g>
</svg>
